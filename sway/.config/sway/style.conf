#
### Layout 
#

# Default wallpaper (more resolutions are available in /usr/share/backgrounds/sway/)
    output * bg ~/.wallpapers/sway.png fill
    output eDP-1 resolution 1920x1080 position 1920,0

#
# Style
#
    include ~/.config/sway/catppuccin-mocha

# target                 title     bg    text   indicator  border
    client.focused           $lavender $base $text  $rosewater $lavender
    client.focused_inactive  $overlay0 $base $text  $rosewater $overlay0
    client.unfocused         $overlay0 $base $text  $rosewater $overlay0
    client.urgent            $peach    $base $peach $overlay0  $peach
    client.placeholder       $overlay0 $base $text  $overlay0  $overlay0
    client.background        $base

# set gtk+ theme
    set $gnome-schema org.gnome.desktop.interface
    exec_always {
        gsettings set $gnome-schema gtk-theme 'Catppuccin-Mocha'
        gsettings set $gnome-schema font-name 'jetbrains mono nerd font 12'
        gsettings set $gnome-schema color-scheme 'prefer-dark'
    }

set $cursor_theme catppuccin-mocha-lavender-cursors
set $cursor_size 24

seat seat0 xcursor_theme $cursor_theme $cursor_size

# Pas de titre, bordures fines ou nulles
    default_border pixel 2
    default_floating_border normal
    titlebar_border_thickness 0
    titlebar_padding 0 0


# Set inner/outer gaps
    gaps inner 5
    gaps outer -3
