#
# Autostart
#
# Filtre lumière bleue
exec_always wlsunset -l 48.85 -L 2.35 -t 3000 -T 6500
exec_always wl-paste --watch cliphist store
exec_always wl-paste --type image --watch cliphist store
exec_always sleep 3 && swaync

exec_always python3 ~/.config/sway/scripts/inactive-windows-transparency.py

#
# Verrouillage auto
#
exec_always --no-startup-id swayidle -w \
  timeout 360 'swaylock -f -c 000000' \
  timeout 420 'swaymsg "output * power off"' \
  resume 'swaymsg "output * power on"' \
  before-sleep 'swaylock -f -c 000000'

