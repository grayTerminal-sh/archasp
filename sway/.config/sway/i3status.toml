[theme]
theme = "ctp-mocha"
[icons]
icons = "material-nf"


[[block]]
block = "focused_window"
[block.format]
full = " $title.str(max_w:15) |"
short = " $title.str(max_w:10) |"

[[block]]
block = "music"
format = " $icon {$combo.str(max_w:20,rot_interval:0.5) $play $next |} "
[[block.click]]
button = "left"
action = "play_pause"
[[block.click]]
button = "middle"
widget = "."
action = "toggle_format"

[[block]]
block = "bluetooth"
mac = "E4:61:F4:F4:A1:F7"
disconnected_format = " 󰂲"
format = " $icon $name"
[block.battery_state]
"0..20" = "critical"
"21..70" = "warning"
"71..100" = "good"

[[block]]
block = "net"
device = "wlan0"
format = " $icon {$signal_strength $ssid} "

[[block]]
block = "sound"
step_width = 3

[[block]]
block = "backlight"
device = "intel_backlight"
invert_icons = true
minimum = 10

[[block]]
block = "battery"
format = " $icon $percentage "

[[block]]
block = "custom"
command = "sh -c 'p=$(powerprofilesctl get); case \"$p\" in performance) echo \" Perf\" ;; balanced) echo \" Bal\" ;; power-saver) echo \" Eco\" ;; *) echo \"$p\" ;; esac'"
interval = 5
format = " $text "
[[block.click]]
button = "left"
cmd = "powerprofilesctl set performance"
[[block.click]]
button = "middle"
cmd = "powerprofilesctl set balanced"
[[block.click]]
button = "right"
cmd = "powerprofilesctl set power-saver"

[[block]]
block = "packages"
package_manager = ["pacman", "aur"]
interval = 600
error_interval = 300
max_retries = 5
format = " $icon $total updates "
format_singular = " $icon $total update "
format_up_to_date = " $icon Up to date "
# aur_command should output available updates to stdout (ie behave as echo -ne "update\n")
aur_command = "yay -Qua"

[[block]]
block = "notify"
driver = "swaync"
[[block.click]]
button = "left"
action = "show"
[[block.click]]
button = "right"
action = "toggle_paused"
[[block]]
block = "time"
interval = 60
[block.format]
full = " $icon $timestamp.datetime(f:'%d-%m-%Y %R')"
short = " $icon $timestamp.datetime(f:%R) "

[[block]]
block = "menu"
text = " \uf011 "
[[block.items]]
display = " -&gt;   Sleep   &lt;-"
cmd = "systemctl suspend"
[[block.items]]
display = " ->  Logout  <-"
cmd = "swaymsg exit"
[[block.items]]
display = " -&gt; Power Off &lt;-"
cmd = "poweroff"
confirm_msg = "Are you sure you want to power off?"
[[block.items]]
display = " -&gt;  Reboot   &lt;-"
cmd = "reboot"
confirm_msg = "Are you sure you want to reboot?"
