###############################################
#                   Keybind                   #
###############################################

### Variables
#
# Logo key. Use Mod1 for Alt.
set $mod Mod4
# Variables
set $left h
set $down j
set $up k
set $right l
set $term kitty

# Start a terminal
    bindsym $mod+Return exec $term

# Kill focused window
    bindsym $mod+q kill

# Drag floating windows by holding down $mod and left mouse button.
# Resize them with right mouse button + $mod.
# Despite the name, also works for non-floating windows.
# Change normal to inverse to use left mouse button for resizing and right
# mouse button for dragging.
    floating_modifier $mod normal

# Exit sway (logs you out of your Wayland session)
    bindsym $mod+Shift+e exec swaynag -t warning -m 'You pressed the exit shortcut. Do you really want to exit sway? This will end your Wayland session.' -B 'Yes, exit sway' 'swaymsg exit'


###############################################
#
# Moving around
#
###############################################

# Move your focus around
    bindsym $mod+$left focus left
    bindsym $mod+$down focus down
    bindsym $mod+$up focus up
    bindsym $mod+$right focus right

# Or use $mod+[up|down|left|right]
    bindsym $mod+Left focus left
    bindsym $mod+Down focus down
    bindsym $mod+Up focus up
    bindsym $mod+Right focus right

# Move the focused window with the same, but add Shift
    bindsym $mod+Shift+$left move left
    bindsym $mod+Shift+$down move down
    bindsym $mod+Shift+$up move up
    bindsym $mod+Shift+$right move right

# Ditto, with arrow keys
    bindsym $mod+Shift+Left move left
    bindsym $mod+Shift+Down move down
    bindsym $mod+Shift+Up move up
    bindsym $mod+Shift+Right move right

###############################################
#
# Workspaces
#
###############################################

# Switch to workspace
    bindsym $mod+ampersand workspace number 1
    bindsym $mod+eacute workspace number 2
    bindsym $mod+quotedbl workspace number 3
    bindsym $mod+apostrophe workspace number 4
    bindsym $mod+parenleft workspace number 5
    bindsym $mod+minus workspace number 6
    bindsym $mod+egrave workspace number 7
    bindsym $mod+underscore workspace number 8
    bindsym $mod+ccedilla workspace number 9
    bindsym $mod+agrave workspace number 10

# Move focused container to workspace
    bindsym $mod+Shift+ampersand move container to workspace number 1
    bindsym $mod+Shift+eacute move container to workspace number 2
    bindsym $mod+Shift+quotedbl move container to workspace number 3
    bindsym $mod+Shift+apostrophe move container to workspace number 4
    bindsym $mod+Shift+parenleft move container to workspace number 5
    bindsym $mod+Shift+minus move container to workspace number 6
    bindsym $mod+Shift+egrave move container to workspace number 7
    bindsym $mod+Shift+underscore move container to workspace number 8
    bindsym $mod+Shift+ccedilla move container to workspace number 9
    bindsym $mod+Shift+agrave move container to workspace number 10

# Note: workspaces can have any name you want, not just numbers.
# We just use 1-10 as the default.

###############################################
#
# Layout stuff
#
###############################################

bindsym $mod+N exec swaync-client -t

###############################################
#
# Layout stuff
#
###############################################

# You can "split" the current object of your focus with
# $mod+b or $mod+v, for horizontal and vertical splits
# respectively.
# bindsym $mod+b splith
# bindsym $mod+v splitv

# Switch the current container between different layout styles
    bindsym $mod+s layout stacking
    bindsym $mod+w layout tabbed
    bindsym $mod+e layout toggle split

# Make the current focus fullscreen
    bindsym $mod+f fullscreen

# Toggle the current focus between tiling and floating mode
    bindsym $mod+Shift+space floating toggle

# Swap focus between the tiling area and the floating area
    bindsym $mod+space focus mode_toggle

# Move focus to the parent container
    bindsym $mod+a focus parent

###############################################
#
# Scratchpad
#
###############################################

# Sway has a "scratchpad", which is a bag of holding for windows.
# You can send windows there and get them back later.

# Move the currently focused window to the scratchpad
    bindsym $mod+Shift+i move scratchpad

# Show the next scratchpad window or hide the focused scratchpad window.
# If there are multiple scratchpad windows, this command cycles through them.
    bindsym $mod+i scratchpad show


###############################################
#
# Resizing containers
#
###############################################

mode "resize" {
# left will shrink the containers width
# right will grow the containers width
# up will shrink the containers height
# down will grow the containers height
    bindsym $left resize shrink width 10px
    bindsym $down resize grow height 10px
    bindsym $up resize shrink height 10px
    bindsym $right resize grow width 10px

# Ditto, with arrow keys
    bindsym Left resize shrink width 10px
    bindsym Down resize grow height 10px
    bindsym Up resize shrink height 10px
    bindsym Right resize grow width 10px

# Return to default mode
    bindsym Return mode "default"
    bindsym Escape mode "default"
}

bindsym $mod+r mode "resize"


###############################################
#
# Utilities
#
###############################################

# Special keys to adjust volume via PulseAudio
    bindsym --locked XF86AudioMute exec pactl set-sink-mute \@DEFAULT_SINK@ toggle
    bindsym --locked XF86AudioLowerVolume exec pactl set-sink-volume \@DEFAULT_SINK@ -5%
    bindsym --locked XF86AudioRaiseVolume exec pactl set-sink-volume \@DEFAULT_SINK@ +5%
    bindsym --locked XF86AudioMicMute exec pactl set-source-mute \@DEFAULT_SOURCE@ toggle
    
# Special keys to adjust brightness via brightnessctl
    bindsym --locked XF86MonBrightnessDown exec brightnessctl set 5%-
    bindsym --locked XF86MonBrightnessUp exec brightnessctl set 5%+


###############################################
#
# Sway
#
###############################################

# Reload Sway config
bindsym $mod+Shift+c Reload

###############################################
#
# Applications
#
###############################################

    bindsym $mod+b exec firefox
    bindsym $mod+g exec google-chrome-stable
    bindsym $mod+p exec perplexity
    bindsym $mod+m exec deezer-desktop
    bindsym $mod+Shift+b exec blueman-manager
    bindsym $mod+Ctrl+L exec swaylock
    bindsym $mod+Ctrl+E exec wofi --cache-file=/dev/null -Dimage_size=26 -Dynamic_lines=true --location top --yoffset=10 --width=600 --height=300 --gtk-dark --show drun
    bindsym $mod+Shift+V exec virtualbox

###############################################
#
# Sreenshot
#
###############################################

# Special key to take a screenshot with grim

# Shift Print = plein écran -> presse-papier
    bindsym Shift+Print exec grim - | wl-copy -t image/png

    # Print = zone -> presse-papier
    bindsym Print exec grim -g "$(slurp)" - | wl-copy -t image/png

    bindsym $mod+v exec ~/.config/sway/scripts/cliphist-wofi-img


###############################################
#
# Power Daemon
#
###############################################
    bindsym $mod+F9 exec powerprofilesctl set power-saver
    bindsym $mod+F10 exec powerprofilesctl set balanced
    bindsym $mod+F11 exec powerprofilesctl set performance

