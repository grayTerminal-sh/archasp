symbol = "ΌΙ╡ "
style = "bold yellow"
format = '[$symbol($virtualenv )]($style) '
python_binary = ["./.venv/bin/python", "python", "python3"]

[rlang]
symbol = "≤░θΦ "

[ruby]
symbol = "ΌηΣ "

[rust]
symbol = "≤▒αΩ "
format = 'via [≤▒αΩ  $version](red bold)'

[scala]
symbol = "Όε╖ "

[shell]
fish_indicator = '≤░Ι║ '
powershell_indicator = 'ΎΣι_'
unknown_indicator = 'mystery shell'
style = 'lavender'
disabled = false

[status]
symbol = "ΎΣπ "

[swift]
symbol = "ΌζΧ "

[time]
disabled = false
format = "[$time]($style) "
time_format = "%H:%M"        # 24h, heures:minutes
style = "blue"

[username]
disabled = false
show_always = true
format = "[$user]($style)"
style_user = "bold lavender"
style_root = "bold red"

[custom.venv]
command = "echo VENV-ACTIVE"
when = '[[ -n "$VIRTUAL_ENV" ]]'
format = '[ $output ](bold red) '

[xmake]
symbol = "ΌηΦ "

[zig]
symbol = "Όγσ "

