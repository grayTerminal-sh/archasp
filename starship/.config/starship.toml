#"$schema" = 'https://starship.rs/config-schema.json'
format = """
$os$username$hostname$directory$git_branch$git_status$python$lua$rust$php$nodejs${custom.venv}
$character
"""
right_format = """
$time$battery
"""
add_newline = true

palette = "catppuccin_mocha"

[[battery.display]]
threshold = 30
style = 'bold red'

[aws]
symbol = "ΌΝ╜ "

[buf]
symbol = "ΎΤζ "

[bun]
symbol = "Όζψ "

[c]
symbol = "Όαη "

[cpp]
symbol = "Όαζ "

[cmake]
symbol = "ΌηΦ "

[conda]
symbol = "ΎΕΝ "

[container]
format = '[$symbol \[$name\]]($style) '

[crystal]
symbol = "Όαψ "

[dart]
symbol = "Όηα "

[deno]
symbol = "ΌθΑ "

[directory]
read_only = " ≤░Ν╛"
truncation_length = 3
truncation_symbol = 'έΑο/'

[docker_context]
symbol = "ΎΝΙ "

[env_var.SHELL]
variable = 'SHELL'
default = 'unknown shell'

[env_var.USER]
default = 'unknown user'

[elixir]
symbol = "Όαφ "

[elm]
symbol = "Όαυ "

[fennel]
symbol = "Όγψ "

[fortran]
symbol = "Όθη "

[fossil_branch]
symbol = "ΎΡα "

[gcloud]
symbol = "Όθ▒ "

[git_branch]
symbol = "ΎΡα "

[git_commit]
tag_symbol = ' ΎΡΤ '

[golang]
symbol = "Όαπ "

[gradle]
symbol = "Όβι "

[guix_shell]
symbol = "ΎΝξ "

[haskell]
symbol = "Όζ╖ "

[haxe]
symbol = "Όβο "

[hg_branch]
symbol = "ΎΡα "

[hostname]
disabled = false
ssh_only = false
format = "[@$hostname]($style) "
style = "bold lavender"
ssh_symbol = "ΌυΒ "

[java]
symbol = "ΌΚΨ "

[julia]
symbol = "Όαν "

[kotlin]
symbol = "Όα┤ "

[localip]
ssh_only = false
format = '@[$localipv4](bold red) '
disabled = false

[lua]
symbol = "Όαι "
format = 'via [Όαι $version](bold blue) '

[memory_usage]
symbol = "≤░Ξδ "

[meson]
symbol = "≤░Φ╖ "

[nim]
symbol = "≤░Ηξ "

[nix_shell]
symbol = "ΎΝΥ "

[nodejs]
symbol = "Όεα "
format = 'via [Όεα $version](bold green) '

[ocaml]
symbol = "Όβ║ "

[os]
disabled = false
format = "[$symbol]($style)-"
style = "bold lavender"

